name: Backend CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend_tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: temurin

      - name: Run backend tests
        run: |
          cd booking
          chmod +x mvnw
          ./mvnw clean verify


  trigger_playwright:
    needs: backend_tests
    runs-on: ubuntu-latest
    steps:
    - name: Trigger Playwright workflow
      run: |
        STATUS=$(curl -s -o response.txt -w "%{http_code}" \
          -X POST \
          https://api.github.com/repos/KarimBassel/Hotel-Booking-Frontend/actions/workflows/playwright.yml/dispatches \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
          -d '{"ref":"master"}')
        
        echo "HTTP Status: $STATUS"
        cat response.txt