name: Java CI + Docker

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-dockerize:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: temurin

      # Build, Test, JaCoCo
      - name: Build, Test and Run JaCoCo
        run: |
          cd booking
          chmod +x ./mvnw
          ./mvnw clean verify

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Docker Image (Triggers Railway Auto Deploy)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            karimbassel/hotel-booking-backend:latest
            karimbassel/hotel-booking-backend:${{ github.sha }}
