spring.application.name=Hotelbooking

# ---- DataSource (Railway-safe) ----
spring.datasource.url=${SPRING_DATABASE_URL}
spring.datasource.username=${SPRING_PGUSER}
spring.datasource.password=${SPRING_PGPASSWORD}

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ---- SQL init ----
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---- Stripe (safe default) ----
stripe.secret-key=${MOCK_STRIPE_SECRET_KEY:dummy_key_for_dev}

# ---- Spring ----
spring.main.allow-bean-definition-overriding=true
